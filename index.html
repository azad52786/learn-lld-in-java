<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLD Notes Hub — Java</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #080c10;
      --surface: #0e1420;
      --surface2: #141c2c;
      --border: #1c2840;
      --accent: #f0a500;
      --accent2: #00cfff;
      --accent3: #ff4d6d;
      --good: #10b981;
      --text: #dde4f0;
      --muted: #526080;
      --grid: rgba(255, 255, 255, 0.015);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
      z-index: 0;
    }

    .blob-1 {
      width: 500px;
      height: 500px;
      background: rgba(240, 165, 0, 0.05);
      top: -100px;
      right: -100px;
    }

    .blob-2 {
      width: 400px;
      height: 400px;
      background: rgba(0, 207, 255, 0.04);
      bottom: 0;
      left: -80px;
    }

    /* HEADER */
    header {
      position: relative;
      z-index: 10;
      padding: 52px 48px 40px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 20px;
    }

    .logo-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-eyebrow::before {
      content: '';
      width: 24px;
      height: 2px;
      background: var(--accent);
      display: inline-block;
    }

    .logo-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(48px, 7vw, 80px);
      line-height: 0.95;
      letter-spacing: 2px;
      color: #fff;
    }

    .logo-title span {
      color: var(--accent);
    }

    .logo-sub {
      color: var(--muted);
      font-size: 14px;
      margin-top: 10px;
      font-weight: 300;
    }

    .header-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 16px;
    }

    .header-stats {
      display: flex;
      gap: 24px;
      align-items: flex-end;
    }

    .stat {
      text-align: right;
    }

    .stat-num {
      font-family: 'Bebas Neue', monospace;
      font-size: 36px;
      line-height: 1;
      color: #fff;
    }

    .stat-label {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      font-family: 'JetBrains Mono', monospace;
    }

    /* MAIN */
    main {
      position: relative;
      z-index: 10;
      max-width: 1000px;
      margin: 0 auto;
      padding: 48px 32px 80px;
    }

    /* FILTER BAR */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .filter-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover,
    .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(240, 165, 0, 0.07);
    }

    /* SORT BAR */
    .sort-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .sort-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .sort-btn:hover,
    .sort-btn.active {
      border-color: var(--accent2);
      color: var(--accent2);
      background: rgba(255, 107, 53, 0.07);
    }

    /* CARDS */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .note-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 22px 22px 18px;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      animation: fadeUp 0.3s ease both;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .note-card:hover {
      border-color: rgba(240, 165, 0, 0.3);
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .card-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .badge-solid {
      background: rgba(240, 165, 0, 0.12);
      color: var(--accent);
      border: 1px solid rgba(240, 165, 0, 0.25);
    }

    .badge-pattern {
      background: rgba(0, 207, 255, 0.1);
      color: var(--accent2);
      border: 1px solid rgba(0, 207, 255, 0.22);
    }

    .badge-concept {
      background: rgba(124, 58, 237, 0.12);
      color: #a78bfa;
      border: 1px solid rgba(124, 58, 237, 0.25);
    }

    .badge-other {
      background: rgba(255, 77, 109, 0.1);
      color: var(--accent3);
      border: 1px solid rgba(255, 77, 109, 0.2);
    }

    .card-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      color: var(--border);
      line-height: 1;
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
      color: #f0f4ff;
      line-height: 1.3;
    }

    .card-link {
      display: flex;
      align-items: center;
      gap: 7px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      text-decoration: none;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      transition: all 0.15s;
    }

    .card-link:hover {
      color: var(--accent2);
      border-color: rgba(0, 207, 255, 0.3);
      background: rgba(0, 207, 255, 0.05);
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .card-date {
      font-size: 11px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .card-actions {
      display: flex;
      gap: 6px;
    }

    .icon-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.15s;
    }

    .icon-btn.open:hover {
      border-color: var(--accent2);
      color: var(--accent2);
      background: rgba(0, 207, 255, 0.08);
    }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-state .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .empty-state p {
      font-size: 15px;
      line-height: 1.6;
    }

    .empty-state strong {
      color: var(--accent);
    }

    /* CATEGORY DIVIDER (All view) */
    .cat-divider {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 10px 0 4px;
    }

    .cat-divider:first-child {
      margin-top: 0;
    }

    .cat-divider-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 4px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .cat-divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }


    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }
  </style>
</head>

<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <!-- HEADER -->
  <header>
    <div class="logo-area">
      <div class="logo-eyebrow">Low Level Design · Java</div>
      <div class="logo-title">LLD<span>.</span>NOTES</div>
      <p class="logo-sub">Your personal index of Low Level Design study notes</p>
    </div>
    <div class="header-right">
      <div class="header-stats">
        <div class="stat">
          <div class="stat-num" id="totalCount">0</div>
          <div class="stat-label">Notes</div>
        </div>
        <div class="stat">
          <div class="stat-num" id="topicCount">0</div>
          <div class="stat-label">Topics</div>
        </div>
      </div>
    </div>
  </header>

  <main>
    <!-- Sort bar -->
    <div class="sort-bar">
      <span class="filter-label">Sort by:</span>
      <button class="sort-btn active" onclick="changeSort('pageNum-asc', this)">📄 Page# ↑</button>
      <button class="sort-btn" onclick="changeSort('pageNum-desc', this)">📄 Page# ↓</button>
      <button class="sort-btn" onclick="changeSort('date-new', this)">📅 Newest</button>
      <button class="sort-btn" onclick="changeSort('date-old', this)">📅 Oldest</button>
      <button class="sort-btn" onclick="changeSort('title-asc', this)">🔤 A-Z</button>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar">
      <span class="filter-label">Filter:</span>
      <button class="filter-btn active" onclick="filterCards('all', this)">All</button>
      <button class="filter-btn" onclick="filterCards('solid', this)">SOLID</button>
      <button class="filter-btn" onclick="filterCards('pattern', this)">Patterns</button>
      <button class="filter-btn" onclick="filterCards('concept', this)">Concepts</button>
      <button class="filter-btn" onclick="filterCards('other', this)">Other</button>
    </div>

    <!-- Cards -->
    <div class="cards-grid" id="cardsGrid"></div>
  </main>

  <script>
    // ══════════════════════════════════════════════════════
    //  � EDIT YOUR NOTES HERE
    //  
    //  To add a new note, add an object with:
    //  - id: unique timestamp (use Date.now() or any unique number)
    //  - title: your note title
    //  - href: full URL to the page
    //  - category: 'solid', 'pattern', 'concept', or 'other'
    //  - pageNum: page number (can be decimal like 4.5)
    //  - date: formatted date string
    // ══════════════════════════════════════════════════════
    const notes = [
      {
        id: 1,
        title: 'Interface Segregation Principle',
        href: './solid/isp/index.html',
        category: 'solid',
        pageNum: 1,
        date: '12 Mar, 2026'
      },
      // Add more notes here...
      // { id: 2, title: 'Single Responsibility', href: './solid/srp/index.html', category: 'solid', pageNum: 2, date: '12 Mar, 2026' },
      // { id: 3, title: 'Factory Pattern', href: './patterns/factory.html', category: 'pattern', pageNum: 1.5, date: '13 Mar, 2026' },
    ];

    // ── BADGE CONFIGURATION ──
    const BADGE_MAP = {
      solid: { label: 'SOLID', cls: 'badge-solid' },
      pattern: { label: 'Design Pattern', cls: 'badge-pattern' },
      concept: { label: 'Concept', cls: 'badge-concept' },
      other: { label: 'Other', cls: 'badge-other' },
    };

    // ── FILTER & SORT STATE ──
    let currentFilter = 'all';
    let currentSort = 'pageNum-asc';

    function filterCards(cat, btn) {
      currentFilter = cat;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderCards(cat);
    }

    function changeSort(sortType, btn) {
      currentSort = sortType;
      document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderCards(currentFilter);
    }

    // Category display order for "All" view
    const CAT_ORDER = ['solid', 'pattern', 'concept', 'other'];

    function sortNotes(list, filter) {
      let sorted = [...list];

      // Apply sorting based on currentSort
      switch (currentSort) {
        case 'pageNum-asc':
          sorted.sort((a, b) => (a.pageNum ?? 9999) - (b.pageNum ?? 9999));
          break;
        case 'pageNum-desc':
          sorted.sort((a, b) => (b.pageNum ?? -1) - (a.pageNum ?? -1));
          break;
        case 'date-new':
          sorted.sort((a, b) => b.id - a.id); // newer IDs are larger (timestamp)
          break;
        case 'date-old':
          sorted.sort((a, b) => a.id - b.id);
          break;
        case 'title-asc':
          sorted.sort((a, b) => a.title.localeCompare(b.title));
          break;
      }

      // If viewing "All" and sorting by page number, also group by category
      if (filter === 'all' && (currentSort === 'pageNum-asc' || currentSort === 'pageNum-desc')) {
        sorted.sort((a, b) => {
          const catA = CAT_ORDER.indexOf(a.category);
          const catB = CAT_ORDER.indexOf(b.category);
          if (catA !== catB) return catA - catB;
          // Then apply page number sort within category
          if (currentSort === 'pageNum-asc') {
            return (a.pageNum ?? 9999) - (b.pageNum ?? 9999);
          } else {
            return (b.pageNum ?? -1) - (a.pageNum ?? -1);
          }
        });
      }

      return sorted;
    }

    function renderCards(filter) {
      const grid = document.getElementById('cardsGrid');
      const base = filter === 'all' ? notes : notes.filter(n => n.category === filter);
      const filtered = sortNotes(base, filter);

      if (filtered.length === 0) {
        grid.innerHTML = `<div class="empty-state"><div class="empty-icon">📂</div><p>No notes in this category yet.</p></div>`;
        return;
      }

      let html = '';
      let lastCat = null;

      filtered.forEach((note, i) => {
        const b = BADGE_MAP[note.category] || BADGE_MAP.other;
        const short = note.href.length > 36 ? '…' + note.href.slice(-32) : note.href;
        const num = note.pageNum != null ? (Number.isInteger(note.pageNum) ? String(note.pageNum).padStart(2, '0') : note.pageNum) : String(i + 1).padStart(2, '0');

        // Insert category divider in "All" view when category changes
        if (filter === 'all' && note.category !== lastCat) {
          lastCat = note.category;
          html += `<div class="cat-divider"><span class="cat-divider-badge ${b.cls}">${b.label}</span><div class="cat-divider-line"></div></div>`;
        }

        html += `
      <div class="note-card" style="animation-delay:${i * 0.04}s">
        <div class="card-top">
          <span class="card-badge ${b.cls}">${b.label}</span>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px;">
            <span class="card-num">${num}</span>
          </div>
        </div>
        <div class="card-title">${esc(note.title)}</div>
        <a class="card-link" href="${esc(note.href)}" target="_blank" title="${esc(note.href)}">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/>
            <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/>
          </svg>
          ${esc(short)}
        </a>
        <div class="card-footer">
          <span class="card-date">${note.date}</span>
          <div class="card-actions">
            <button class="icon-btn open" title="Open" onclick="window.open('${esc(note.href)}','_blank')">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
                <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
              </svg>
            </button>
          </div>
        </div>
      </div>`;
      });

      grid.innerHTML = html;
    }

    function updateStats() {
      document.getElementById('totalCount').textContent = notes.length;
      document.getElementById('topicCount').textContent = new Set(notes.map(n => n.category)).size;
    }

    function esc(str) {
      return String(str).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // ── INITIALIZE ──
    renderCards('all');
    updateStats();
  </script>
</body>

</html>
